services:
  mysql:
    image: mysql:latest
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
      - ./db-dumps:/docker-entrypoint-initdb.d/

  adminer:
    image: "adminer:latest"
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  db_data:
